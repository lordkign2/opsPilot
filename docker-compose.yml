version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: opspilot-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DATABASE_URL=postgresql+asyncpg://opspilot:opspilot_secret@postgres:5432/opspilot_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-CHANGE_ME_TO_A_RANDOM_64_CHAR_STRING}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - opspilot-network

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: opspilot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: opspilot_secret
      POSTGRES_DB: opspilot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspilot -d opspilot_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - opspilot-network

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: opspilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - opspilot-network

volumes:
  postgres_data:
  redis_data:

networks:
  opspilot-network:
    driver: bridge
